[package]
name = "rvw"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Terminal code review tool for agent-produced branches"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }
git2 = "0.19"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
dirs = "6"
sha2 = "0.10"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
ctrlc = "3"
